services:
  mongo-test:
    image: mongo:latest
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.adminCommand(\"ping\")' || exit 1"]      
      interval: 2s
      timeout: 2s
      retries: 10

  api:
    build: .
    environment:
      - NODE_ENV=test
      - DATABASE_URL=mongodb://mongo-test:27017/subscribers_test
      - PORT=3001
    depends_on:
      mongo-test:
        condition: service_healthy
    volumes:
      - ./coverage:/app/coverage
